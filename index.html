<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Blackjack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    <section class="screen screen-home" id="screen-home">
      <div class="home-col">
        <header class="home-header">
          <h1 class="app-title">Blackjack</h1>
          <p class="app-subtitle">Learn the game. Master the count.</p>
        </header>

        <div class="deck" aria-hidden="true">
          <div class="card-back" style="--i:0"></div>
          <div class="card-back" style="--i:1"></div>
          <div class="card-back" style="--i:2"></div>
          <div class="card-back" style="--i:3"></div>
          <div class="card-back" style="--i:4"></div>
          <div class="card-back card-back--top" style="--i:5">
            <span class="card-back-mono">BJ</span>
          </div>
        </div>

        <nav class="mode-list">
          <button class="mode-btn" data-mode="1">
            <span class="mini-card mini-card--black">
              <span class="mini-card-corner">
                <span class="mini-card-rank">A</span>
                <span class="mini-card-suit">&clubs;</span>
              </span>
              <span class="mini-card-center">&clubs;</span>
            </span>
            <span class="mode-title">Learn to Play</span>
          </button>

          <button class="mode-btn" data-mode="2">
            <span class="mini-card mini-card--red">
              <span class="mini-card-corner">
                <span class="mini-card-rank">2</span>
                <span class="mini-card-suit">&hearts;</span>
              </span>
              <span class="mini-card-center">&hearts;</span>
            </span>
            <span class="mode-title">Learn to Count</span>
          </button>

          <button class="mode-btn" data-mode="3">
            <span class="mini-card mini-card--black">
              <span class="mini-card-corner">
                <span class="mini-card-rank">3</span>
                <span class="mini-card-suit">&spades;</span>
              </span>
              <span class="mini-card-center">&spades;</span>
            </span>
            <span class="mode-title">Test Yourself</span>
          </button>
        </nav>
      </div>
    </section>

    <section class="screen screen-game hidden" id="screen-game">
      <button class="back-btn" id="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="game-body">
        <h2 class="game-title" id="game-title">Mode</h2>
        <p class="game-placeholder">Coming soon</p>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
