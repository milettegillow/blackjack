<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Blackjack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,600;1,700;1,800&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="stage">
    <section class="screen screen-home" id="screen-home">
      <div class="home-col">
        <header class="home-header">
          <h1 class="app-title">Blackjack</h1>
        </header>

        <div class="deck-wrap">
          <div class="deck" aria-hidden="true">
            <img class="card-back" src="assets/cards/back.svg" alt="" style="--i:0">
            <img class="card-back" src="assets/cards/back.svg" alt="" style="--i:1">
            <img class="card-back" src="assets/cards/back.svg" alt="" style="--i:2">
            <img class="card-back" src="assets/cards/back.svg" alt="" style="--i:3">
            <img class="card-back" src="assets/cards/back.svg" alt="" style="--i:4">
          </div>
        </div>

        <nav class="mode-list">
          <button class="mode-btn" data-mode="1">
            <img class="mini-card" src="assets/cards/AC.svg" alt="" width="38">
            <span class="mode-title">Learn to Play</span>
          </button>

          <button class="mode-btn" data-mode="2">
            <img class="mini-card" src="assets/cards/2H.svg" alt="" width="38">
            <span class="mode-title">Learn to Count</span>
          </button>

          <button class="mode-btn" data-mode="3">
            <img class="mini-card" src="assets/cards/3S.svg" alt="" width="38">
            <span class="mode-title">Test Yourself</span>
          </button>
        </nav>
      </div>
    </section>

    <section class="screen screen-game hidden" id="screen-game">
      <button class="back-btn" id="back-btn" aria-label="Back to home">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="game-body">
        <h2 class="game-title" id="game-title">Mode</h2>
        <p class="game-placeholder">Coming soon</p>
      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
