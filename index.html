<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <title>Blackjack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage">
      <section class="screen screen-home" id="screen-home">
        <div class="home-col">
          <header class="home-header">
            <h1 class="app-title">Blackjack</h1>
          </header>

          <div class="deck-wrap">
            <div class="deck" aria-hidden="true">
              <img
                class="card-back"
                src="assets/cards/back.svg"
                alt=""
                style="--i: 0"
              />
              <img
                class="card-back"
                src="assets/cards/back.svg"
                alt=""
                style="--i: 1"
              />
              <img
                class="card-back"
                src="assets/cards/back.svg"
                alt=""
                style="--i: 2"
              />
              <img
                class="card-back"
                src="assets/cards/back.svg"
                alt=""
                style="--i: 3"
              />
              <img
                class="card-back"
                src="assets/cards/back.svg"
                alt=""
                style="--i: 4"
              />
            </div>
          </div>

          <nav class="mode-list">
            <button class="mode-btn" data-mode="1">
              <img
                class="mini-card"
                src="assets/cards/AC.svg"
                alt=""
                width="38"
              />
              <span class="mode-title">Learn to Play</span>
            </button>

            <button class="mode-btn" data-mode="2">
              <img
                class="mini-card"
                src="assets/cards/2H.svg"
                alt=""
                width="38"
              />
              <span class="mode-title">Learn to Count</span>
            </button>

            <button class="mode-btn" data-mode="3">
              <img
                class="mini-card"
                src="assets/cards/3S.svg"
                alt=""
                width="38"
              />
              <span class="mode-title">Test Yourself</span>
            </button>
          </nav>
        </div>
      </section>

      <div class="game-screen hidden" id="gameScreen">
        <div class="topbar">
          <button class="icon-btn" id="backBtn" aria-label="Back">
            &larr;
          </button>
          <div class="top-mode gold-text" id="topMode">Mode Name</div>
          <button class="icon-btn" id="infoBtn" aria-label="Help">?</button>
        </div>

        <div class="count-panel hidden" id="countPanel">
          <div class="cp-label">True Count</div>
          <div class="cp-hero" id="trueCount">0.0</div>
          <div class="cp-secondary">
            <span>Run <strong id="runningCount">0</strong></span>
            <span>Decks <strong id="decksLeft">6.0</strong></span>
          </div>
          <div class="cp-divider"></div>
          <div class="advantage" id="advantage">NEUTRAL</div>
        </div>

        <div class="deck-indicator hidden" id="deckIndicator">
          <div class="deck-stack-mini">
            <img src="assets/cards/back.svg" alt="" />
            <img src="assets/cards/back.svg" alt="" />
            <img src="assets/cards/back.svg" alt="" />
          </div>
          <div class="deck-count" id="deckCount">312 / 312</div>
        </div>

        <div class="table">
          <div class="dealer-area">
            <div class="seat-label">Dealer</div>
            <div class="hand-zone" id="dealerHand"></div>
            <div class="hand-score" id="dealerScore"></div>
          </div>

          <div class="message" id="message"></div>

          <div class="player-area">
            <div class="hand-zone" id="playerHand"></div>
            <div class="hand-indicator hidden" id="handIndicator"></div>
            <div class="hand-score" id="playerScore"></div>
            <div class="seat-label">Player</div>
          </div>
        </div>

        <div class="money-row hidden" id="moneyRow">
          <div class="bankroll">
            <span class="bankroll-label">Bankroll</span>
            <span class="bankroll-amount" id="bankrollAmount">$1,000</span>
            <button class="bet-clear" id="resetBankroll">Reset</button>
          </div>
          <div class="bet-display">
            <span class="bet-label">Current Bet</span>
            <span class="bet-amount" id="currentBet">$0</span>
            <span class="bet-result" id="betResult"></span>
            <button class="bet-clear" id="clearBet">Clear</button>
          </div>
        </div>

        <div class="action-bar">
          <div class="strategy-hint" id="strategyHint"></div>
          <div class="strategy-feedback" id="strategyFeedback"></div>
          <div class="actions" id="actionsRow">
            <button class="action-btn" id="hitBtn" disabled>
              <span>Hit</span>
            </button>
            <button class="action-btn" id="standBtn" disabled>
              <span>Stand</span>
            </button>
            <button class="action-btn" id="doubleBtn" disabled>
              <span>Double</span>
            </button>
            <button class="action-btn" id="splitBtn" disabled>
              <span>Split</span>
            </button>
          </div>

          <div class="chip-rack hidden" id="chipRackM2">
            <div class="chip-row">
              <button class="chip chip-skip" data-bet="0">
                <span class="chip-label">Skip</span>
              </button>
              <button class="chip chip-low" data-bet="low">
                <span class="chip-label">Low</span>
              </button>
              <button class="chip chip-high" data-bet="high">
                <span class="chip-label">High</span>
              </button>
            </div>
          </div>

          <div class="chip-rack hidden" id="chipRackM3">
            <div class="chip-row">
              <button class="chip chip-skip" data-bet="0">
                <span class="chip-label">Skip</span>
              </button>
              <button class="chip chip-green" data-bet="25">
                <span class="chip-label">$25</span>
              </button>
              <button class="chip chip-orange" data-bet="50">
                <span class="chip-label">$50</span>
              </button>
              <button class="chip chip-black" data-bet="100">
                <span class="chip-label">$100</span>
              </button>
              <button class="chip chip-pink" data-bet="250">
                <span class="chip-label">$250</span>
              </button>
              <button class="chip chip-purple" data-bet="500">
                <span class="chip-label">$500</span>
              </button>
            </div>
          </div>

          <div class="deal-btn-wrap" id="dealBtnWrap">
            <button class="deal-btn" id="dealBtn">Deal</button>
          </div>
        </div>

        <div
          class="bankrupt-modal hidden"
          id="bankruptModal"
          aria-hidden="true"
        >
          <div class="bankrupt-backdrop"></div>
          <div class="bankrupt-card">
            <h2 class="bankrupt-title">Pockets Empty</h2>
            <p class="bankrupt-body">
              Your bankroll has hit zero. Time to step away from the table!
            </p>
            <button class="bankrupt-btn" id="bankruptHomeBtn">
              Back to Menu
            </button>
          </div>
        </div>

        <div
          class="tutorial-modal hidden"
          id="tutorialModal"
          aria-hidden="true"
        >
          <div class="tutorial-backdrop"></div>
          <div class="tutorial-card">
            <div class="tutorial-progress" id="tutorialProgress">1 / 7</div>
            <h2 class="tutorial-title" id="tutorialTitle">The Goal</h2>
            <div class="tutorial-body" id="tutorialBody"></div>
            <div class="tutorial-actions">
              <button class="tutorial-skip" id="tutorialSkip">Skip</button>
              <button class="tutorial-next" id="tutorialNext">Next</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="main.js"></script>
  </body>
</html>
